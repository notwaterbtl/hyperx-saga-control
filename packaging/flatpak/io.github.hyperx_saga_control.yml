# Experimental Flatpak manifest scaffold.
# This is not the recommended install method yet.
app-id: io.github.hyperx_saga_control
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: hyperx-saga-control
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=all
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: hyperx-saga-control
    buildsystem: simple
    build-commands:
      - python3 -m pip install --prefix=/app .
      - install -Dm644 share/icons/hyperx-saga-control.svg /app/share/icons/hicolor/scalable/apps/hyperx-saga-control.svg
      - sed 's#__BIN__#hyperx-saga-control#g' share/applications/io.github.hyperx_saga_control.desktop.in > /app/share/applications/io.github.hyperx_saga_control.desktop
    sources:
      - type: dir
        path: ../..
